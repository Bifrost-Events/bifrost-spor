# Reusable workflow â€“ deploy med credentials fra GitHub Environment secrets.
# Krav: FTP_* synkronisert via Deploy-Admin Â«Synk secrets til GitHubÂ».
#
# Hvilke miljÃ¸er som deployes (prioritet):
# 1) Input environments / secret DEPLOY_ENVIRONMENTS (fast liste)
# 2) Deploy-Admin API + ref/ref_type (branch/tag-regler per deployment â€“ anbefalt)
# 3) GitHub API â€“ alle repo environments (legacy, uten ref-filter)

name: Deploy via Deploy-Admin (GitHub secrets)

on:
  workflow_call:
    inputs:
      environments:
        description: 'JSON-array med environment-navn (f.eks. ["hjellum","jaktfeltcup"]). Ved Ã¥ fylle ut brukes IKKE Deploy-Admin API.'
        required: false
        default: ''
        type: string

      api_base:
        description: Deploy-Admin API base URL (kun nÃ¥r environments ikke er satt)
        required: false
        default: 'https://hjellum.net/deploy-admin/api'
        type: string

      ref:
        description: Git ref (branch or tag) to deploy
        required: false
        default: main
        type: string

      ref_type:
        description: 'branch eller tag (send github.ref_type fra caller). Styrer hvilke Deploy-Admin-regler som matches.'
        required: false
        default: ''
        type: string

      manifest_path:
        description: Path to deploy manifest
        required: false
        default: deploy-manifest.json
        type: string

      submodule_path:
        description: Path to auth-module submodule folder (optional)
        required: false
        default: auth-module
        type: string

      checkout_submodules:
        description: Whether to init/update submodules
        required: false
        default: true
        type: boolean

      composer_install:
        description: Whether to run composer install
        required: false
        default: true
        type: boolean

      composer_ci_file:
        description: 'Use this file as composer.json in CI (e.g. composer.ci.json with vcs repos). If set, runs composer update instead of install.'
        required: false
        default: ''
        type: string

      release_id:
        description: Release ID for version metadata (public/version.json)
        required: false
        default: ''
        type: string

    secrets:
      DEPLOY_ADMIN_APP_KEY:
        required: false
        description: Application key for Deploy-Admin API (to fetch target list)
      DEPLOY_ADMIN_ADMIN_KEY:
        required: false
        description: Admin key for Deploy-Admin API (to fetch target list)
      PAT_TOKEN:
        required: false
        description: Personal Access Token for private repos/submodules
      CALLER_GITHUB_TOKEN:
        required: false
        description: Caller repo token (e.g. secrets.GITHUB_TOKEN) for looking up environments via GitHub API
      DEPLOY_ENVIRONMENTS:
        required: false
        description: 'Secret med JSON-array av environment-navn (f.eks. ["hjellum","jaktfeltcup"])'

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.targets.outputs.matrix }}
      skip_deploy: ${{ steps.targets.outputs.skip_deploy }}
      ftpExclude: ${{ steps.manifest.outputs.ftpExclude }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
          submodules: false
          token: ${{ secrets.PAT_TOKEN || github.token }}

      - name: Checkout submodules
        if: ${{ inputs.checkout_submodules }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          SUBMODULE_PATH: ${{ inputs.submodule_path }}
        run: |
          set -euo pipefail
          if [ ! -f .gitmodules ] || [ ! -s .gitmodules ]; then exit 0; fi
          if [ -n "${PAT_TOKEN:-}" ]; then
            git config --global url."https://${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"
            git config --global credential.helper store
            echo "https://${PAT_TOKEN}@github.com" > ~/.git-credentials
            chmod 600 ~/.git-credentials
          fi
          git submodule sync --recursive 2>&1 | grep -v "No url found" || true
          git submodule update --init --recursive --depth 1 2>&1 || true

      - name: Install Composer dependencies
        if: ${{ inputs.composer_install }}
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          COMPOSER_CI_FILE: ${{ inputs.composer_ci_file }}
        run: |
          set -euo pipefail
          if [ ! -f "composer.json" ]; then exit 0; fi
          command -v composer >/dev/null || (php -r "copy('https://getcomposer.org/installer', 'composer-setup.php');" && php composer-setup.php --install-dir=/usr/local/bin --filename=composer && php -r "unlink('composer-setup.php');")
          if [ -n "${PAT_TOKEN:-}" ]; then
            composer config --global github-oauth.github.com "$PAT_TOKEN"
            composer config --global github-protocols https
            git config --global url."https://x-access-token:${PAT_TOKEN}@github.com/".insteadOf "git@github.com:"
          fi
          if [ -n "${COMPOSER_CI_FILE:-}" ] && [ -f "$COMPOSER_CI_FILE" ]; then
            cp "$COMPOSER_CI_FILE" composer.json
            composer update --no-dev --optimize-autoloader --no-interaction
          else
            composer install --no-dev --optimize-autoloader --no-interaction
          fi

      - name: Determine deploy targets
        id: targets
        env:
          ENVIRONMENTS_JSON: ${{ inputs.environments }}
          DEPLOY_ENVIRONMENTS: ${{ secrets.DEPLOY_ENVIRONMENTS }}
          CALLER_GITHUB_TOKEN: ${{ secrets.CALLER_GITHUB_TOKEN }}
          API_BASE: ${{ inputs.api_base }}
          APP_KEY: ${{ secrets.DEPLOY_ADMIN_APP_KEY }}
          ADMIN_KEY: ${{ secrets.DEPLOY_ADMIN_ADMIN_KEY }}
          REF: ${{ inputs.ref }}
          REF_TYPE: ${{ inputs.ref_type }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq)
          ENVS="${ENVIRONMENTS_JSON:-${DEPLOY_ENVIRONMENTS:-}}"
          if [ -n "$ENVS" ]; then
            MATRIX_JSON=$(echo "$ENVS" | jq -c 'if type == "array" then [.[] | if type == "string" then {environment: .} else . end] | {include: .} else error("environments mÃ¥ vÃ¦re JSON-array") end')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using environments from input/secret"
          elif [ -n "${APP_KEY:-}" ] || [ -n "${ADMIN_KEY:-}" ]; then
            if [ -n "${APP_KEY:-}" ]; then AUTH_PARAM="app_key=${APP_KEY}"; else AUTH_PARAM="admin_key=${ADMIN_KEY}"; fi
            REF_TYPE_PARAM=""
            if [ -n "${REF_TYPE:-}" ]; then REF_TYPE_PARAM="&ref_type=${REF_TYPE}"; fi
            URL="${API_BASE}/deploy-targets.php?repo=${REPO}&ref=${REF}&credentials=github&${AUTH_PARAM}${REF_TYPE_PARAM}"
            RESPONSE=$(curl -sS --max-time 30 "$URL") || true
            SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
            if [ "$SUCCESS" != "true" ]; then
              MSG=$(echo "$RESPONSE" | jq -r '.message // "Deploy-Admin API error"')
              echo "::error::${MSG}"
              exit 1
            fi
            DEPLOYMENTS=$(echo "$RESPONSE" | jq -c '.data.deployments')
            COUNT=$(echo "$DEPLOYMENTS" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
              echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
              echo "Ingen deploy-targets for ref=${REF} ref_type=${REF_TYPE:-auto} â€“ hopper over deploy"
              exit 0
            fi
            MATRIX_JSON=$(echo "$DEPLOYMENTS" | jq -c '[.[] | {environment: .environment}] | {include: .}')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using ${COUNT} environment(s) from Deploy-Admin for ref=${REF}"
          elif [ -n "${CALLER_GITHUB_TOKEN:-}" ]; then
            echo "::warning::Deployer til ALLE GitHub environments uten ref-filter. Bruk DEPLOY_ADMIN_APP_KEY for branch/tag-regler."
            RESPONSE=$(curl -sS -H "Authorization: Bearer ${CALLER_GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${REPO}/environments?per_page=100") || true
            NAMES=$(echo "$RESPONSE" | jq -r '.environments[]?.name // empty' 2>/dev/null)
            if [ -z "$NAMES" ]; then
              echo "::error::GitHub API returnerte ingen environments for $REPO. KjÃ¸r secrets-sync eller bruk DEPLOY_ADMIN_APP_KEY."
              exit 78
            fi
            MATRIX_JSON=$(echo "$NAMES" | jq -R -s -c 'split("\n") | map(select(length > 0)) | [.[] | {environment: .}] | {include: .}')
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
            echo "skip_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using environments from GitHub API ($(echo "$NAMES" | wc -l) environments)"
          else
            echo "::error::Sett DEPLOY_ADMIN_APP_KEY (anbefalt), environments/DEPLOY_ENVIRONMENTS, eller CALLER_GITHUB_TOKEN"
            exit 1
          fi

      - name: Prepare manifest and create deployment package
        id: manifest
        env:
          MANIFEST: ${{ inputs.manifest_path }}
        run: |
          set -euo pipefail
          rm -rf deploy-package && mkdir -p deploy-package
          if [ -f "$MANIFEST" ]; then
            EXCLUDE_STR=$(jq -r '.ftpExclude[]? // empty' "$MANIFEST" | paste -sd '\n' - | sed 's/\"/\\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "ftpExclude=${EXCLUDE_STR}" >> "$GITHUB_OUTPUT"
            FILTER_FILE=$(mktemp)
            echo "+ */" >> "$FILTER_FILE" && echo "+ /.htaccess" >> "$FILTER_FILE"
            jq -r '.include[]' "$MANIFEST" | while read -r pattern; do
              echo "+ ${pattern}" >> "$FILTER_FILE"
              case "$pattern" in */) echo "+ ${pattern}***" >> "$FILTER_FILE" ;; esac
            done
            jq -r '.exclude[]? // empty' "$MANIFEST" | while read -r pattern; do echo "- ${pattern}" >> "$FILTER_FILE"; done
            echo "- *" >> "$FILTER_FILE"
            rsync -a --delete --prune-empty-dirs --filter="merge $FILTER_FILE" ./ deploy-package/
            echo "Deploy-pakke: $(du -sh deploy-package | cut -f1), filer: $(find deploy-package -type f | wc -l)"
          else
            echo "ftpExclude=" >> "$GITHUB_OUTPUT"
            rsync -a --delete --prune-empty-dirs --exclude='.git' --exclude='.github' --exclude='node_modules' --exclude='vendor' --exclude='deploy-package' ./ deploy-package/
          fi
          # Document root = public/ â€“ sÃ¸rg for at .htaccess og index.php finnes der (FTP kan hoppe over dotfiles).
          mkdir -p deploy-package/public
          if [ -f "public/.htaccess" ]; then
            cp public/.htaccess deploy-package/public/.htaccess
            cp public/.htaccess deploy-package/.htaccess
            cp public/.htaccess deploy-package/htaccess-backup.txt
          fi
          if [ -f "public/index.php" ] && [ ! -f "deploy-package/public/index.php" ]; then
            cp public/index.php deploy-package/public/index.php
          fi
          if [ -n "${{ inputs.release_id }}" ]; then
            mkdir -p deploy-package/public
            command -v jq >/dev/null || (sudo apt-get update -qq && sudo apt-get install -y jq)
            jq -n \
              --arg releaseId "${{ inputs.release_id }}" \
              --arg commit "$(git rev-parse HEAD)" \
              --arg repo "${{ github.repository }}" \
              --arg builtAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              '{releaseId: $releaseId, commit: $commit, repo: $repo, builtAt: $builtAt}' \
              > deploy-package/public/version.json
            echo "âœ“ version.json generated for release ${{ inputs.release_id }}"
          fi
          echo "âœ“ Deployment package created (public/.htaccess included)"

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v7
        with:
          name: deploy-package
          path: deploy-package/

  deploy:
    needs: build
    if: ${{ needs.build.outputs.skip_deploy != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.targets) }}

    environment: ${{ matrix.environment }}

    steps:
      - name: Download deployment package
        uses: actions/download-artifact@v8
        with:
          name: deploy-package
          path: deploy-package/

      - name: Restore .htaccess (if missing)
        run: |
          if [ ! -f "deploy-package/public/.htaccess" ] && [ -f "deploy-package/htaccess-backup.txt" ]; then
            mkdir -p deploy-package/public
            cp deploy-package/htaccess-backup.txt deploy-package/public/.htaccess
          fi
          if [ ! -f "deploy-package/.htaccess" ] && [ -f "deploy-package/htaccess-backup.txt" ]; then
            cp deploy-package/htaccess-backup.txt deploy-package/.htaccess
          fi
          ls -la deploy-package/.htaccess deploy-package/public/.htaccess 2>/dev/null || true

      - name: Resolve FTP credentials and log deploy target
        id: ftp_creds
        env:
          FTP_HOST: ${{ vars.FTP_HOST || secrets.FTP_HOST }}
          FTP_USERNAME: ${{ vars.FTP_USERNAME || secrets.FTP_USERNAME }}
          FTP_PATH: ${{ vars.FTP_PATH || secrets.FTP_PATH }}
          FTP_PROTOCOL: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          FTP_PORT: ${{ vars.FTP_PORT || '' }}
        run: |
          set -euo pipefail
          echo "Deploy environment: ${{ matrix.environment }}"
          if [ -z "${FTP_HOST:-}" ]; then
            echo "::error::FTP_HOST is empty for environment ${{ matrix.environment }}"
            exit 1
          fi
          if [ -z "${FTP_USERNAME:-}" ]; then
            echo "::error::FTP_USERNAME is empty for environment ${{ matrix.environment }}"
            exit 1
          fi
          if [ -z "${FTP_PATH:-}" ]; then
            echo "::error::FTP_PATH is empty for environment ${{ matrix.environment }}"
            exit 1
          fi
          protocol=$(echo "${FTP_PROTOCOL:-ftp}" | tr '[:upper:]' '[:lower:]')
          port="${FTP_PORT:-}"
          if [ -z "$port" ]; then
            if [ "$protocol" = "sftp" ]; then port=22; else port=21; fi
          fi
          user="$FTP_USERNAME"
          if [ "$protocol" = "sftp" ]; then
            user="${user%_ftp}"
            echo "ProISP SFTP: SSH-brukernavn uten _ftp"
          elif echo "$FTP_HOST" | grep -qi 'service.one' && [[ "$user" != *_ftp ]]; then
            user="${user}_ftp"
            echo "ProISP FTP: brukernavn med _ftp-suffix"
          fi
          echo "username=$user" >> "$GITHUB_OUTPUT"
          echo "protocol=$protocol" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Deploy via SFTP (ProISP SSH-brukernavn)
        if: steps.ftp_creds.outputs.protocol == 'sftp'
        env:
          FTP_HOST: ${{ vars.FTP_HOST || secrets.FTP_HOST }}
          FTP_USERNAME: ${{ steps.ftp_creds.outputs.username }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ vars.FTP_PATH || secrets.FTP_PATH }}
          FTP_PORT: ${{ steps.ftp_creds.outputs.port }}
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          remote="${FTP_PATH%/}/"
          lftp -e "
          set sftp:connect-program 'ssh -a -x -oStrictHostKeyChecking=accept-new';
          open -u ${FTP_USERNAME},${FTP_PASSWORD} sftp://${FTP_HOST}:${FTP_PORT};
          mirror -R --parallel=4 --verbose deploy-package/ ${remote};
          quit
          "

      - name: Deploy via FTP (credentials from GitHub Environment secrets)
        if: steps.ftp_creds.outputs.protocol != 'sftp'
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ vars.FTP_HOST || secrets.FTP_HOST }}
          username: ${{ steps.ftp_creds.outputs.username }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.FTP_PATH || secrets.FTP_PATH }}
          port: ${{ steps.ftp_creds.outputs.port }}
          protocol: ${{ steps.ftp_creds.outputs.protocol }}
          local-dir: deploy-package/
          exclude: ${{ needs.build.outputs.ftpExclude }}
          dangerous-clean-slate: false
